<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expensio">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#04111F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Expensio — Henderson Rowe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #04111F;
    --bg2: #071428;
    --bg3: #0A1E38;
    --border: #1A3A5C;
    --border2: #0F2A45;
    --teal: #00C4E8;
    --teal-dim: rgba(0,196,232,0.12);
    --green: #00C896;
    --amber: #F59E0B;
    --red: #F87171;
    --text: #E8F4FD;
    --text2: #7BA7C4;
    --text3: #4A7FA0;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #app { display: flex; flex-direction: column; height: 100vh; }
  #main { display: flex; flex: 1; }
  #sidebar {
    width: 240px; min-height: 100vh;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  #content { margin-left: 240px; flex: 1; padding: 32px; max-width: 1200px; overflow-y: auto; }

  .sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-logo h1 { font-size: 20px; font-weight: 700; color: var(--teal); letter-spacing: -0.3px; }
  .sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .sidebar-user { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .sidebar-user-info { flex: 1; min-width: 0; }
  .sidebar-user-info .name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-user-info .role { font-size: 11px; color: var(--text3); }

  nav { padding: 12px 0; flex: 1; }
  .nav-section { padding: 0 12px; margin-bottom: 4px; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 8px 8px 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--teal-dim); color: var(--teal); }
  .nav-item .icon { font-size: 15px; width: 20px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--amber); color: #000; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }

  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--card-shadow); }
  .card + .card { margin-top: 12px; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
  .stat-val { font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .page-header { margin-bottom: 24px; }
  .page-header h2 { font-size: 24px; font-weight: 700; }
  .page-header p { font-size: 13px; color: var(--text3); margin-top: 4px; }

  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .filter-btn:hover { border-color: var(--teal); color: var(--teal); }
  .filter-btn.active { background: var(--teal); border-color: var(--teal); color: var(--bg); }

  .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .pill-pending { background: #1E1A08; color: var(--amber); }
  .pill-approved { background: #0A2E20; color: var(--green); }
  .pill-rejected { background: #2E0A0A; color: var(--red); }
  .pill-preauth { background: #1E1A08; color: var(--amber); }
  .pill-converted { background: #0A1E38; color: var(--text2); }

  .expense-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 10px; }
  .expense-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .expense-title { font-size: 15px; font-weight: 600; }
  .expense-amount { font-size: 18px; font-weight: 700; }
  .expense-meta { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .expense-detail { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .expense-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border2); }

  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  input, select, textarea { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-family: inherit; font-size: 14px; transition: border-color 0.15s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--teal); }
  select option { background: var(--bg2); }
  textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--teal); color: var(--bg); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-danger { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid var(--red); }
  .btn-success { background: rgba(0,200,150,0.15); color: var(--green); border: 1px solid var(--green); }
  .btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #login-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-box { width: 100%; max-width: 420px; }
  .login-logo { text-align: center; margin-bottom: 40px; }
  .login-logo h1 { font-size: 32px; font-weight: 700; color: var(--teal); }
  .login-logo p { font-size: 14px; color: var(--text3); margin-top: 6px; }

  .receipt-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; }
  .receipt-thumbs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; }
  .modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }

  /* Mobile Improvements */
  @media (max-width: 768px) {
    html { -webkit-text-size-adjust: 100%; }
    body { -webkit-tap-highlight-color: transparent; }
    #sidebar { display: none; }
    #content { margin-left: 0; padding: 12px 14px 100px; max-width: 100%; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #main { flex-direction: column; height: 100%; }

    #mobile-topbar { display: flex !important; padding: 14px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 150; flex-shrink: 0; }

    .stats-row { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .form-row { grid-template-columns: 1fr; gap: 12px; }
    .page-header h2 { font-size: 20px; }

    .btn { padding: 14px 20px; font-size: 15px; min-height: 52px; border-radius: 12px; }
    .btn-sm { padding: 10px 16px; font-size: 13px; min-height: 42px; }
    input, select, textarea { padding: 14px 16px; font-size: 16px; min-height: 52px; border-radius: 12px; }
    textarea { min-height: 100px; }

    .filter-btn { padding: 9px 16px; font-size: 13px; min-height: 42px; white-space: nowrap; }
    .filters { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 8px; margin: 0 -14px 20px; padding-left: 14px; padding-right: 14px; gap: 8px; }
    .filters::-webkit-scrollbar { display: none; }

    .expense-card { padding: 16px; border-radius: 12px; margin-bottom: 12px; }
    .expense-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .expense-footer { flex-direction: column; align-items: flex-start; gap: 8px; }
    .expense-meta, .expense-detail { font-size: 13px; line-height: 1.4; }

    .card { padding: 18px; border-radius: 12px; }
    .receipt-thumb { width: 72px; height: 72px; }

    #submit-btn { position: sticky; bottom: 20px; z-index: 10; margin-top: 20px; }

    .toast { left: 16px; right: 16px; transform: none; bottom: calc(80px + env(safe-area-inset-bottom)); padding: 16px 20px; }

    #mobile-nav {
      display: flex !important;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg2); border-top: 1px solid var(--border);
      padding: 8px 4px max(12px, env(safe-area-inset-bottom)); z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    .mobile-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; cursor: pointer; padding: 8px 4px; border-radius: 12px;
      font-size: 10px; color: var(--text3); border: none; background: none;
      font-family: inherit; transition: all 0.15s;
    }
    .mobile-nav-item.active { color: var(--teal); background: var(--teal-dim); }
    .mobile-nav-item .m-icon { font-size: 20px; }
  }

  @media (min-width: 769px) {
    #mobile-nav { display: none !important; }
    #mobile-topbar { display: none !important; }
  }
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Expensio</h1>
      <p>Expense management for Henderson Rowe</p>
    </div>
    <div class="form-group">
      <label>Select your name</label>
      <select id="login-name">
        <option value="">Choose your name…</option>
      </select>
    </div>
    <div id="login-pin-section" style="display:none">
      <div class="form-group">
        <label>Enter your PIN</label>
        <input type="password" id="login-pin" maxlength="4" placeholder="••••" inputmode="numeric">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Sign in →</button>
      <p id="login-error" style="color:var(--red);font-size:12px;margin-top:8px;text-align:center"></p>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
  <div id="mobile-topbar" style="display:none">
    <div class="mt-left">
      <span id="mt-avatar"></span>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text)" id="mt-name"></div>
        <div class="mt-mode" id="mt-mode"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <button id="mt-ops-switch" style="display:none;background:var(--bg3);border:1px solid var(--border);color:var(--teal);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;padding:6px 10px;border-radius:8px" onclick="toggleOpsModeMobile()"></button>
      <button onclick="signOut()" style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;padding:8px">Sign out</button>
    </div>
  </div>
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>Expensio</h1>
      <p>Henderson Rowe</p>
    </div>
    <div class="sidebar-user">
      <div class="avatar" id="sidebar-avatar"></div>
      <div class="sidebar-user-info">
        <div class="name" id="sidebar-name"></div>
        <div class="role" id="sidebar-role-label"></div>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="signout-btn" onclick="signOut()">← Sign out</button>
    </div>
  </div>

  <div id="content">
    <div id="page-content"></div>
  </div>
</div>

<!-- Mobile bottom nav -->
<div id="mobile-nav" style="display:none">
  <button class="mobile-nav-item active" id="mnav-expenses" onclick="mobileNav('expenses')">
    <span class="m-icon">🧾</span>Expenses
  </button>
  <button class="mobile-nav-item" id="mnav-submit" onclick="mobileNav('submit')">
    <span class="m-icon">➕</span>Submit
  </button>
  <button class="mobile-nav-item" id="mnav-preauth" onclick="mobileNav('preauth')">
    <span class="m-icon">🔐</span>Pre-Auth
  </button>
  <button class="mobile-nav-item" id="mnav-queue" onclick="mobileNav('queue')" style="display:none">
    <span class="m-icon">🛡</span>Queue
  </button>
  <button class="mobile-nav-item" id="mnav-payments" onclick="mobileNav('payments')" style="display:none">
    <span class="m-icon">💳</span>Payments
  </button>
  <button class="mobile-nav-item" id="mnav-reports" onclick="mobileNav('reports')" style="display:none">
    <span class="m-icon">📊</span>Reports
  </button>
</div>

</div>

<!-- Toast -->
<div id="toast" class="toast" style="display:none">
  <span id="toast-icon">✓</span>
  <span class="toast-text" id="toast-text"></span>
</div>

<!-- Image Modal -->
<div id="img-modal" class="modal-overlay" style="display:none" onclick="closeImgModal()">
  <img id="img-modal-img" src="" style="max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain">
</div>

<script>
// Full script with dropdown fix
const FB_PROJECT = 'expensio-ac443';
const FB_BASE = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

const TEAM_DATA = [ /* your full TEAM_DATA array from original */ ];

 // ... (all other constants and functions from your original script) ...

function initLogin() {
  const sel = document.getElementById('login-name');
  if (!sel) return;
  sel.innerHTML = '<option value="">Choose your name…</option>';
  TEAM_DATA.forEach(u => {
    const o = document.createElement('option');
    o.value = u.name;
    o.textContent = u.name;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => {
    document.getElementById('login-pin-section').style.display = sel.value ? 'block' : 'none';
    document.getElementById('login-pin').value = '';
    document.getElementById('login-error').textContent = '';
  });
  const pinInput = document.getElementById('login-pin');
  if (pinInput) pinInput.addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
}

// Call it
document.addEventListener('DOMContentLoaded', initLogin);
initLogin();
</script>
</body>
</html>
