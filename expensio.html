<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expensio">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#04111F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Expensio — Henderson Rowe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #04111F;
    --bg2: #071428;
    --bg3: #0A1E38;
    --border: #1A3A5C;
    --border2: #0F2A45;
    --teal: #00C4E8;
    --teal-dim: rgba(0,196,232,0.12);
    --green: #00C896;
    --amber: #F59E0B;
    --red: #F87171;
    --text: #E8F4FD;
    --text2: #7BA7C4;
    --text3: #4A7FA0;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #app { display: flex; flex-direction: column; height: 100vh; }
  #main { display: flex; flex: 1; }
  #sidebar {
    width: 240px; min-height: 100vh;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  #content { margin-left: 240px; flex: 1; padding: 32px; max-width: 1200px; overflow-y: auto; }

  .sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-logo h1 { font-size: 20px; font-weight: 700; color: var(--teal); letter-spacing: -0.3px; }
  .sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .sidebar-user { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .sidebar-user-info { flex: 1; min-width: 0; }
  .sidebar-user-info .name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-user-info .role { font-size: 11px; color: var(--text3); }

  nav { padding: 12px 0; flex: 1; }
  .nav-section { padding: 0 12px; margin-bottom: 4px; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 8px 8px 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--teal-dim); color: var(--teal); }
  .nav-item .icon { font-size: 15px; width: 20px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--amber); color: #000; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }

  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--card-shadow); }
  .card + .card { margin-top: 12px; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
  .stat-val { font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .page-header { margin-bottom: 24px; }
  .page-header h2 { font-size: 24px; font-weight: 700; }
  .page-header p { font-size: 13px; color: var(--text3); margin-top: 4px; }

  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .filter-btn:hover { border-color: var(--teal); color: var(--teal); }
  .filter-btn.active { background: var(--teal); border-color: var(--teal); color: var(--bg); }

  .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .pill-pending { background: #1E1A08; color: var(--amber); }
  .pill-approved { background: #0A2E20; color: var(--green); }
  .pill-rejected { background: #2E0A0A; color: var(--red); }
  .pill-preauth { background: #1E1A08; color: var(--amber); }
  .pill-converted { background: #0A1E38; color: var(--text2); }

  .expense-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 10px; }
  .expense-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .expense-title { font-size: 15px; font-weight: 600; }
  .expense-amount { font-size: 18px; font-weight: 700; }
  .expense-meta { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .expense-detail { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .expense-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border2); }

  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  input, select, textarea { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-family: inherit; font-size: 14px; transition: border-color 0.15s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--teal); }
  select option { background: var(--bg2); }
  textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--teal); color: var(--bg); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-danger { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid var(--red); }
  .btn-success { background: rgba(0,200,150,0.15); color: var(--green); border: 1px solid var(--green); }
  .btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #login-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-box { width: 100%; max-width: 420px; }
  .login-logo { text-align: center; margin-bottom: 40px; }
  .login-logo h1 { font-size: 32px; font-weight: 700; color: var(--teal); }
  .login-logo p { font-size: 14px; color: var(--text3); margin-top: 6px; }

  .receipt-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; }
  .receipt-thumbs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; }
  .modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }

  /* Mobile */
  @media (max-width: 768px) {
    html { -webkit-text-size-adjust: 100%; }
    body { -webkit-tap-highlight-color: transparent; }
    #sidebar { display: none; }
    #content { margin-left: 0; padding: 12px 14px 100px; max-width: 100%; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #main { flex-direction: column; height: 100%; }

    #mobile-topbar { display: flex !important; padding: 14px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 150; flex-shrink: 0; }

    .stats-row { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .form-row { grid-template-columns: 1fr; gap: 12px; }
    .page-header h2 { font-size: 20px; }

    .btn { padding: 14px 20px; font-size: 15px; min-height: 52px; border-radius: 12px; }
    .btn-sm { padding: 10px 16px; font-size: 13px; min-height: 42px; }
    input, select, textarea { padding: 14px 16px; font-size: 16px; min-height: 52px; border-radius: 12px; }
    textarea { min-height: 100px; }

    .filter-btn { padding: 9px 16px; font-size: 13px; min-height: 42px; white-space: nowrap; }
    .filters { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 8px; margin: 0 -14px 20px; padding-left: 14px; padding-right: 14px; gap: 8px; }
    .filters::-webkit-scrollbar { display: none; }

    .expense-card { padding: 16px; border-radius: 12px; margin-bottom: 12px; }
    .expense-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .expense-footer { flex-direction: column; align-items: flex-start; gap: 8px; }
    .expense-meta, .expense-detail { font-size: 13px; line-height: 1.4; }

    .card { padding: 18px; border-radius: 12px; }
    .receipt-thumb { width: 72px; height: 72px; }

    #submit-btn { position: sticky; bottom: 20px; z-index: 10; margin-top: 20px; }

    .toast { left: 16px; right: 16px; transform: none; bottom: calc(80px + env(safe-area-inset-bottom)); padding: 16px 20px; }

    #mobile-nav {
      display: flex !important;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg2); border-top: 1px solid var(--border);
      padding: 8px 4px max(12px, env(safe-area-inset-bottom)); z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    .mobile-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; cursor: pointer; padding: 8px 4px; border-radius: 12px;
      font-size: 10px; color: var(--text3); border: none; background: none;
      font-family: inherit; transition: all 0.15s;
    }
    .mobile-nav-item.active { color: var(--teal); background: var(--teal-dim); }
    .mobile-nav-item .m-icon { font-size: 20px; }
  }

  @media (min-width: 769px) {
    #mobile-nav { display: none !important; }
    #mobile-topbar { display: none !important; }
  }
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Expensio</h1>
      <p>Expense management for Henderson Rowe</p>
    </div>
    <div class="form-group">
      <label>Select your name</label>
      <select id="login-name">
        <option value="">Choose your name…</option>
      </select>
    </div>
    <div id="login-pin-section" style="display:none">
      <div class="form-group">
        <label>Enter your PIN</label>
        <input type="password" id="login-pin" maxlength="4" placeholder="••••" inputmode="numeric">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Sign in →</button>
      <p id="login-error" style="color:var(--red);font-size:12px;margin-top:8px;text-align:center"></p>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
  <div id="mobile-topbar" style="display:none">
    <div class="mt-left">
      <span id="mt-avatar"></span>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text)" id="mt-name"></div>
        <div class="mt-mode" id="mt-mode"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <button id="mt-ops-switch" style="display:none;background:var(--bg3);border:1px solid var(--border);color:var(--teal);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;padding:6px 10px;border-radius:8px" onclick="toggleOpsModeMobile()"></button>
      <button onclick="signOut()" style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;padding:8px">Sign out</button>
    </div>
  </div>
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>Expensio</h1>
      <p>Henderson Rowe</p>
    </div>
    <div class="sidebar-user">
      <div class="avatar" id="sidebar-avatar"></div>
      <div class="sidebar-user-info">
        <div class="name" id="sidebar-name"></div>
        <div class="role" id="sidebar-role-label"></div>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="signout-btn" onclick="signOut()">← Sign out</button>
    </div>
  </div>

  <div id="content">
    <div id="page-content"></div>
  </div>
</div>

<!-- Mobile bottom nav -->
<div id="mobile-nav" style="display:none">
  <button class="mobile-nav-item active" id="mnav-expenses" onclick="mobileNav('expenses')">
    <span class="m-icon">🧾</span>Expenses
  </button>
  <button class="mobile-nav-item" id="mnav-submit" onclick="mobileNav('submit')">
    <span class="m-icon">➕</span>Submit
  </button>
  <button class="mobile-nav-item" id="mnav-preauth" onclick="mobileNav('preauth')">
    <span class="m-icon">🔐</span>Pre-Auth
  </button>
  <button class="mobile-nav-item" id="mnav-queue" onclick="mobileNav('queue')" style="display:none">
    <span class="m-icon">🛡</span>Queue
  </button>
  <button class="mobile-nav-item" id="mnav-payments" onclick="mobileNav('payments')" style="display:none">
    <span class="m-icon">💳</span>Payments
  </button>
  <button class="mobile-nav-item" id="mnav-reports" onclick="mobileNav('reports')" style="display:none">
    <span class="m-icon">📊</span>Reports
  </button>
</div>

</div>

<!-- Toast -->
<div id="toast" class="toast" style="display:none">
  <span id="toast-icon">✓</span>
  <span class="toast-text" id="toast-text"></span>
</div>

<!-- Image Modal -->
<div id="img-modal" class="modal-overlay" style="display:none" onclick="closeImgModal()">
  <img id="img-modal-img" src="" style="max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain">
</div>

<script>
const FB_PROJECT = 'expensio-ac443';
const FB_BASE = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

const TEAM_DATA = [
  { name:'Ana Diaz Diaz', pin:'1234', role:'ops' },
  { name:'Artur Baluszynski', pin:'1234', role:'ops' },
  { name:'Ben Ashby', pin:'1111', role:'staff' },
  { name:'Ben Wheelan', pin:'1111', role:'staff' },
  { name:'Charles Astor', pin:'1111', role:'staff' },
  { name:'Cristina Leong', pin:'1234', role:'ops' },
  { name:'Dom Wright', pin:'1111', role:'staff' },
  { name:'Eliott Ferguson', pin:'1111', role:'staff' },
  { name:'Emma McGregor', pin:'1111', role:'staff' },
  { name:'Emma Taylor', pin:'1111', role:'staff' },
  { name:'Jacob Burchill', pin:'1111', role:'staff' },
  { name:'John Whick', pin:'1111', role:'staff' },
  { name:'Julisuz Czajewski', pin:'1111', role:'staff' },
  { name:'Justin Hayward', pin:'1111', role:'staff' },
  { name:'Kevin Reid', pin:'1111', role:'staff' },
  { name:'Kimmy Beattie', pin:'1234', role:'ops' },
  { name:'Malean Vuong', pin:'1234', role:'ops' },
  { name:'Maureen Kirwan', pin:'1111', role:'staff' },
  { name:'Nicholas Henryanto', pin:'1111', role:'staff' },
  { name:'Nick Lawson-Smith', pin:'1111', role:'staff' },
  { name:'Olivia Jackson', pin:'1111', role:'staff' },
  { name:'Omar Henry', pin:'1111', role:'staff' },
  { name:'Peter Ashby', pin:'1111', role:'staff' },
  { name:'Peter Li', pin:'1111', role:'staff' },
  { name:'Rory Franks', pin:'2017', role:'staff' },
  { name:'Stephen Hannan', pin:'1111', role:'staff' },
  { name:'Tom Simpson', pin:'1111', role:'staff' },
];

const CATS = ['Travel','Client/Prospect Meals & Entertainment','Staff Meals & Entertainment','Subsistence','Software & Subscriptions','Office Supplies','Equipment','Training & Education','Other'];
const HELD_WITH = ['Client','Prospect','Third Party','Other — Please Specify','N/A'];
const AVATAR_COLORS = [
  {bg:'#0A2540',text:'#60A5FA'},{bg:'#0A2E20',text:'#34D399'},{bg:'#1E1A08',text:'#FCD34D'},
  {bg:'#2E0A2E',text:'#E879F9'},{bg:'#1A0A2E',text:'#A78BFA'},{bg:'#2E0A0A',text:'#F87171'},
  {bg:'#0A1E2E',text:'#38BDF8'},{bg:'#0A2E1A',text:'#4ADE80'},{bg:'#2E1A0A',text:'#FB923C'},
  {bg:'#0A2A1A',text:'#2DD4BF'},{bg:'#1E0A2E',text:'#C084FC'},{bg:'#2E0A1A',text:'#FB7185'},
];

let currentUser = null;
let currentRole = null;
let opsMode = null;
let currentPage = 'expenses';
let expenses = [];
let loading = false;

function fromVal(v) {
  if(v.stringValue !== undefined) return v.stringValue;
  if(v.booleanValue !== undefined) return v.booleanValue;
  if(v.doubleValue !== undefined) return v.doubleValue;
  if(v.integerValue !== undefined) return Number(v.integerValue);
  if(v.nullValue !== undefined) return null;
  if(v.arrayValue !== undefined) return (v.arrayValue.values||[]).map(fromVal);
  if(v.mapValue !== undefined) { const o={}; for(const[k,v2] of Object.entries(v.mapValue.fields||{})) o[k]=fromVal(v2); return o; }
  return null;
}
function toVal(val) {
  if(val===null||val===undefined) return {nullValue:null};
  if(typeof val==='boolean') return {booleanValue:val};
  if(typeof val==='number') return {doubleValue:val};
  if(typeof val==='string') return {stringValue:val};
  if(Array.isArray(val)) return {arrayValue:{values:val.map(toVal)}};
  if(typeof val==='object') { const f={}; for(const[k,v] of Object.entries(val)) f[k]=toVal(v); return {mapValue:{fields:f}}; }
  return {stringValue:String(val)};
}
function fromDoc(doc) {
  const id = doc.name.split('/').pop();
  const o = {id};
  for(const[k,v] of Object.entries(doc.fields||{})) o[k]=fromVal(v);
  return o;
}
function toFields(obj) {
  const f={};
  for(const[k,v] of Object.entries(obj)) { if(k==='id') continue; f[k]=toVal(v); }
  return {fields:f};
}

async function loadExpenses() {
  const res = await fetch(`${FB_BASE}/expenses?pageSize=500`);
  const json = await res.json();
  if(!json.documents) return [];
  return json.documents.map(fromDoc).sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt));
}
async function saveDoc(id, data) {
  const res = await fetch(`${FB_BASE}/expenses/${id}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(toFields(data))
  });
  if(!res.ok) throw new Error('Save failed');
}
async function createDoc(id, data) {
  const res = await fetch(`${FB_BASE}/expenses?documentId=${id}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(toFields(data))
  });
  if(!res.ok) throw new Error('Create failed');
}
async function deleteDoc(id) {
  await fetch(`${FB_BASE}/expenses/${id}`, {method:'DELETE'});
}

function fmtAmt(n) { return '£'+(parseFloat(n)||0).toFixed(2); }
function fmtDate(iso) {
  if(!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); } catch(e){ return iso; }
}
function initials(n) { return n.split(' ').map(w=>w[0]).join('').slice(0,2); }
function avatarEl(name, size=36) {
  const idx = TEAM_DATA.findIndex(t=>t.name===name);
  const col = AVATAR_COLORS[(idx>=0?idx:0)%AVATAR_COLORS.length];
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${col.bg};color:${col.text};font-size:${size*0.32}px">${initials(name||'?')}</div>`;
}
function pillHtml(status) {
  const map = {pending:'pill-pending',approved:'pill-approved',rejected:'pill-rejected',converted:'pill-converted'};
  const labels = {pending:'Pending',approved:'Approved',rejected:'Rejected',converted:'Converted'};
  return `<span class="pill ${map[status]||'pill-pending'}">${labels[status]||status}</span>`;
}
function showToast(msg, icon='✓') {
  const t = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  document.getElementById('toast-icon').textContent = icon;
  t.style.display = 'flex';
  setTimeout(()=>t.style.display='none', 3500);
}
function openImgModal(url) {
  document.getElementById('img-modal-img').src = url;
  document.getElementById('img-modal').style.display = 'flex';
}
function closeImgModal() { document.getElementById('img-modal').style.display = 'none'; }

function initLogin() {
  const sel = document.getElementById('login-name');
  sel.innerHTML = '<option value="">Choose your name…</option>';
  TEAM_DATA.forEach(u => {
    const o = document.createElement('option');
    o.value = u.name; o.textContent = u.name;
    sel.appendChild(o);
  });
  sel.addEventListener('change', ()=>{
    document.getElementById('login-pin-section').style.display = sel.value ? 'block' : 'none';
    document.getElementById('login-pin').value = '';
    document.getElementById('login-error').textContent = '';
  });
  document.getElementById('login-pin').addEventListener('keydown', e=>{ if(e.key==='Enter') handleLogin(); });
}

function handleLogin() {
  const name = document.getElementById('login-name').value;
  const pin = document.getElementById('login-pin').value;
  const user = TEAM_DATA.find(u=>u.name===name);
  if(!user) return;
  if(pin !== user.pin) {
    document.getElementById('login-error').textContent = 'Incorrect PIN. Please try again.';
    return;
  }
  currentUser = name;
  currentRole = user.role;
  if(currentRole === 'ops') {
    showOpsRoleSelect();
  } else {
    startApp();
  }
}

function showOpsRoleSelect() {
  document.getElementById('login-screen').innerHTML = `
    <div class="login-box">
      <div class="login-logo">
        <h1>Expensio</h1>
        <p>How would you like to use Expensio today?</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <button class="btn" style="background:var(--bg3);border:1px solid var(--teal);padding:20px;border-radius:14px;width:100%;text-align:left;cursor:pointer" onclick="setOpsMode('submit')">
          <div style="font-size:24px;margin-bottom:6px">📝</div>
          <div style="font-size:16px;font-weight:700;color:var(--text)">Submit expenses</div>
          <div style="font-size:13px;color:var(--text3);margin-top:4px">Submit and manage your own expenses</div>
        </button>
        <button class="btn" style="background:var(--bg3);border:1px solid var(--border);padding:20px;border-radius:14px;width:100%;text-align:left;cursor:pointer" onclick="setOpsMode('approve')">
          <div style="font-size:24px;margin-bottom:6px">🛡</div>
          <div style="font-size:16px;font-weight:700;color:var(--text)">Approve expenses</div>
          <div style="font-size:13px;color:var(--text3);margin-top:4px">Review and approve the team's submissions</div>
        </button>
      </div>
    </div>
  `;
}

function setOpsMode(mode) {
  opsMode = mode;
  startApp();
}

function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
  setupSidebar();
  setupMobileNav();
  currentPage = currentRole==='ops' && opsMode==='approve' ? 'queue' : 'expenses';
  refreshData().then(()=>renderPage());
}

function signOut() {
  currentUser = null; currentRole = null; opsMode = null; expenses = [];
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-screen').innerHTML = `
    <div class="login-box">
      <div class="login-logo"><h1>Expensio</h1><p>Expense management for Henderson Rowe</p></div>
      <div class="form-group"><label>Select your name</label><select id="login-name"><option value="">Choose your name…</option></select></div>
      <div id="login-pin-section" style="display:none">
        <div class="form-group"><label>Enter your PIN</label><input type="password" id="login-pin" maxlength="4" placeholder="••••" inputmode="numeric"></div>
        <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Sign in →</button>
        <p id="login-error" style="color:var(--red);font-size:12px;margin-top:8px;text-align:center"></p>
      </div>
    </div>`;
  initLogin();
}

function setupSidebar() {
  const idx = TEAM_DATA.findIndex(t=>t.name===currentUser);
  const col = AVATAR_COLORS[(idx>=0?idx:0)%AVATAR_COLORS.length];
  const av = document.getElementById('sidebar-avatar');
  av.textContent = initials(currentUser);
  av.style.background = col.bg; av.style.color = col.text;
  document.getElementById('sidebar-name').textContent = currentUser;
  document.getElementById('sidebar-role-label').textContent = currentRole==='ops' ? `Ops — ${opsMode==='approve'?'Approver':'Submitter'}` : 'Staff';

  document.getElementById('mt-avatar').innerHTML = avatarEl(currentUser, 32);
  document.getElementById('mt-name').textContent = currentUser;
  document.getElementById('mt-mode').textContent = currentRole==='ops' ? `Ops — ${opsMode==='approve'?'Approver':'Submitter'}` : 'Staff';
  const opsSwitch = document.getElementById('mt-ops-switch');
  if(currentRole==='ops') {
    opsSwitch.style.display = 'block';
    opsSwitch.textContent = opsMode==='approve' ? '📝 Submit' : '🛡 Approve';
  } else {
    opsSwitch.style.display = 'none';
  }

  renderNav();
}

function renderNav() {
  const pending = expenses.filter(e=>e.status==='pending'&&e.type!=='preauth').length;
  const isApprover = currentRole==='ops' && opsMode==='approve';
  const isSubmitter = currentRole==='staff' || (currentRole==='ops' && opsMode==='submit');

  let nav = '';

  if(isApprover) {
    nav += `
      <div class="nav-section">
        <div class="nav-label">Approver</div>
        ${navItem('queue','🛡','Queue', pending > 0 ? `<span class="nav-badge">${pending}</span>` : '')}
        ${navItem('payments','💳','Payments')}
        ${navItem('reports','📊','Reports')}
      </div>`;
  }

  if(isSubmitter) {
    nav += `
      <div class="nav-section">
        <div class="nav-label">My Expenses</div>
        ${navItem('expenses','🧾','My Expenses')}
        ${navItem('submit','➕','Submit Expense')}
        ${navItem('preauth','🔐','Pre-Authorisations')}
      </div>`;
  }

  if(currentRole==='ops') {
    nav += `
      <div class="nav-section" style="margin-top:8px">
        <div class="nav-label">Switch Mode</div>
        ${navItem('_submit_mode','📝','Submit Mode','','opsMode!==\'approve\'')}
        ${navItem('_approve_mode','🛡','Approve Mode','','opsMode===\'approve\'')}
      </div>`;
  }

  document.getElementById('sidebar-nav').innerHTML = nav;
}

function navItem(page, icon, label, badge='', activeCheck=null) {
  const isActive = activeCheck ? eval(activeCheck) : currentPage === page;
  return `<button class="nav-item ${isActive?'active':''}" onclick="navigate('${page}')">
    <span class="icon">${icon}</span>${label}${badge}
  </button>`;
}

function toggleOpsModeMobile() {
  if(opsMode === 'approve') { opsMode = 'submit'; currentPage = 'expenses'; }
  else { opsMode = 'approve'; currentPage = 'queue'; }
  setupSidebar();
  setupMobileNav();
  renderPage();
}

function navigate(page) {
  if(page === '_submit_mode') { opsMode = 'submit'; currentPage = 'expenses'; renderNav(); renderPage(); return; }
  if(page === '_approve_mode') { opsMode = 'approve'; currentPage = 'queue'; renderNav(); renderPage(); return; }
  currentPage = page;
  renderNav();
  renderPage();
}

async function refreshData() {
  loading = true;
  try {
    expenses = await loadExpenses();
    const now = new Date();
    for(const e of expenses) {
      if(e.status==='pending' && e.autoApproveAt && new Date(e.autoApproveAt)<=now) {
        const updated = {...e, status:'approved', reviewedAt:now.toISOString(), autoApproveAt:null};
        await saveDoc(e.id, updated);
        Object.assign(e, updated);
      }
    }
  } catch(err) { console.error(err); }
  loading = false;
}

function renderPage() {
  const c = document.getElementById('page-content');
  switch(currentPage) {
    case 'expenses': c.innerHTML = renderMyExpenses(); break;
    case 'submit': c.innerHTML = renderSubmitForm(); break;
    case 'preauth': c.innerHTML = renderMyPreAuths(); break;
    case 'queue': c.innerHTML = renderOpsQueue(); break;
    case 'payments': c.innerHTML = renderPayments(); break;
    case 'reports': c.innerHTML = renderReports(); break;
    default: c.innerHTML = renderMyExpenses();
  }
  attachEventListeners();
}

// ... (the rest of your functions: renderMyExpenses, expenseCardHtml, submitExpense, etc. are the same as your original file) ...

initLogin();
</script>
</body>
